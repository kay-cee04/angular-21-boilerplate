<div class="card">
    <h3 class="card-header">Reset Password</h3>
    <div class="card-body">
        <!-- Validating state -->
        <div *ngIf="tokenStatus === TokenStatus.Validating" class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Validating token...</span>
            </div>
            <p class="mt-2">Validating token...</p>
        </div>
        
        <!-- Invalid token state -->
        <div *ngIf="tokenStatus === TokenStatus.Invalid" class="alert alert-danger">
            Token validation failed. Please request a new password reset link.
            <a routerLink="/account/forgot-password" class="alert-link">Click here</a>
        </div>
        
        <!-- Valid token - show reset form -->
        <form *ngIf="tokenStatus === TokenStatus.Valid" [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label class="form-label">New Password</label>
                <input type="password" formControlName="password" class="form-control" 
                       [ngClass]="{ 'is-invalid': submitted && f['password']?.errors }" />
                <div *ngIf="submitted && f['password']?.errors" class="invalid-feedback">
                    <div *ngIf="f['password']?.errors['required']">Password is required</div>
                    <div *ngIf="f['password']?.errors['minlength']">Password must be at least 6 characters</div>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Confirm New Password</label>
                <input type="password" formControlName="confirmPassword" class="form-control" 
                       [ngClass]="{ 'is-invalid': submitted && f['confirmPassword']?.errors }" />
                <div *ngIf="submitted && f['confirmPassword']?.errors" class="invalid-feedback">
                    <div *ngIf="f['confirmPassword']?.errors['required']">Confirm Password is required</div>
                    <div *ngIf="f['confirmPassword']?.errors['mustMatch']">Passwords must match</div>
                </div>
            </div>
            
            <div class="mb-3">
                <button [disabled]="loading" class="btn btn-primary">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                    Reset Password
                </button>
                <a routerLink="/account/login" class="btn btn-link">Cancel</a>
            </div>
        </form>
    </div>
</div>
