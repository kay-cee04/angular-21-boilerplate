<div class="card">
    <h4 class="card-header">Forgot Password</h4>
    <div class="card-body">
        
        <!-- Success Message - Inside card body -->
        <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
            <strong>✅ Success!</strong> {{successMessage}}
            <button type="button" class="btn-close" (click)="successMessage = ''"></button>
        </div>
        
        <!-- Error Message - Inside card body -->
        <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
            <strong>❌ Error!</strong> {{errorMessage}}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
        </div>
    
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" formControlName="email" class="form-control" 
                       [ngClass]="{ 'is-invalid': submitted && f['email'].errors }"
                       placeholder="Enter your registered email address" />
                <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                    <div *ngIf="f['email'].errors['required']">Email address is required</div>
                    <div *ngIf="f['email'].errors['email']">Please enter a valid email address</div>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button [disabled]="loading" class="btn btn-primary">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                    Send Reset Link
                </button>
                <a routerLink="../login" class="btn btn-link">Back to Login</a>
            </div>
        </form>
        
        <hr class="my-3">
        
        <div class="text-muted small">
            <p class="mb-0">⚠️ Note: If you don't receive the email within a few minutes, please check your spam/junk folder.</p>
        </div>
    </div>
</div>
